<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S. THEJAS — Artist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase (reads live content from your Firestore database) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0a0a0b;
  --bg-alt:#131315;
  --bg-card:#18181b;
  --fg:#f4f2ec;
  --muted:#9a978f;
  --accent:#cda746;
  --accent-soft:#e2d39a;
  --line:rgba(244,242,236,0.09);
  --danger:#d96a5a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--fg);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.display{font-family:'Archivo Black',sans-serif;}
.eyebrow{
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-soft);font-weight:600;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 32px;}
@media(max-width:640px){.wrap{padding:0 18px;}}

/* ---------- NAV ---------- */
.nav{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px;background:rgba(10,10,11,0.82);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.nav .logo{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.06em;}
.nav .logo img{height:34px;width:auto;border-radius:4px;}
.nav-links{display:flex;align-items:center;gap:30px;font-size:14px;font-weight:500;color:var(--muted);}
.nav-links a{transition:color .2s;}
.nav-links a:hover{color:var(--fg);}
@media(max-width:860px){.nav-links{display:none;}}
.btn{
  padding:10px 22px;border-radius:999px;font-size:13px;font-weight:600;letter-spacing:.03em;
  border:1px solid var(--accent-soft);color:var(--accent-soft);transition:all .2s;
}
.btn:hover{background:var(--accent-soft);color:#141410;}
.btn.solid{background:var(--accent);border-color:var(--accent);color:#141410;}
.btn.solid:hover{background:var(--accent-soft);border-color:var(--accent-soft);}
.menu-toggle{display:none;font-size:22px;width:44px;height:44px;border-radius:50%;background:var(--bg-card);align-items:center;justify-content:center;position:relative;z-index:60;}
@media(max-width:860px){
  .menu-toggle{display:flex;}
  .nav-cta{display:none;}
}
/* Full-screen mobile menu */
.mobile-menu{
  position:fixed;inset:0;background:#0a0a0bf7;backdrop-filter:blur(16px);
  z-index:55;display:flex;flex-direction:column;justify-content:center;padding:40px;
  opacity:0;pointer-events:none;transform:translateY(-12px);
  transition:opacity .35s ease, transform .35s ease;
}
.mobile-menu.open{opacity:1;pointer-events:auto;transform:translateY(0);}
.mobile-menu a{
  font-family:'Archivo Black',sans-serif;font-size:clamp(30px,9vw,52px);
  color:var(--fg);padding:14px 0;border-bottom:1px solid var(--line);
  opacity:0;transform:translateX(-16px);transition:opacity .4s ease, transform .4s ease;
}
.mobile-menu.open a{opacity:1;transform:translateX(0);}
.mobile-menu.open a:nth-child(1){transition-delay:.05s;}
.mobile-menu.open a:nth-child(2){transition-delay:.1s;}
.mobile-menu.open a:nth-child(3){transition-delay:.15s;}
.mobile-menu.open a:nth-child(4){transition-delay:.2s;}
.mobile-menu .mm-cta{margin-top:30px;align-self:flex-start;}
@media(min-width:861px){.mobile-menu{display:none;}}

/* ---------- HERO ---------- */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;padding:120px 0 60px;}
.hero-glow{position:absolute;top:-20%;right:-10%;width:60%;height:80%;background:radial-gradient(circle,rgba(205,167,70,.16),transparent 65%);pointer-events:none;}
.hero-grid{position:relative;z-index:2;width:100%;display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center;}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr;gap:40px;}}
.hero-eyebrow-row{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.hero-eyebrow-row .rule{width:40px;height:1px;background:var(--accent);}
.hero-name{font-size:clamp(46px,7.2vw,96px);line-height:.95;letter-spacing:-.01em;}
.hero-tagline{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,2.6vw,26px);letter-spacing:.05em;color:var(--accent-soft);margin-top:10px;}
.hero-bio{max-width:520px;color:var(--muted);margin-top:22px;font-size:16px;line-height:1.7;}
.social-row{display:flex;gap:12px;margin-top:28px;}
.social-row a{width:42px;height:42px;border-radius:50%;background:var(--bg-card);border:1px solid var(--line);color:var(--fg);display:flex;align-items:center;justify-content:center;transition:all .25s;}
.social-row a:hover{background:var(--accent-soft);color:#141410;transform:translateY(-3px);border-color:var(--accent-soft);}
.hero-ctas{display:flex;flex-wrap:wrap;gap:14px;margin-top:32px;}
.hero-ctas .btn{padding:14px 26px;font-size:14px;}
.hero-ctas .btn.light{background:var(--fg);color:#141410;border-color:var(--fg);}
.hero-ctas .btn.light:hover{background:var(--accent-soft);border-color:var(--accent-soft);}
.hero-portrait{position:relative;aspect-ratio:4/5;border-radius:20px;overflow:hidden;}
.hero-portrait img{width:100%;height:100%;object-fit:cover;}
.hero-portrait:before{content:"";position:absolute;inset:0;background:linear-gradient(200deg,transparent 55%,rgba(10,10,11,.55));}
.hero-portrait-frame{position:absolute;inset:14px;border:1px solid rgba(244,242,236,.25);border-radius:14px;pointer-events:none;}
.hero-badge{position:absolute;left:-18px;bottom:-18px;background:var(--accent);color:#141410;padding:16px 20px;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em;box-shadow:0 18px 40px rgba(0,0,0,.4);}
.hero-badge b{display:block;font-family:'Archivo Black',sans-serif;font-size:22px;}
@media(max-width:900px){.hero-badge{left:14px;bottom:14px;}}
.hero-anim{opacity:0;transform:translateY(22px);animation:heroUp .8s ease forwards;}
.hero-anim.a1{animation-delay:.05s;}
.hero-anim.a2{animation-delay:.18s;}
.hero-anim.a3{animation-delay:.30s;}
.hero-anim.a4{animation-delay:.42s;}
.hero-anim.a5{animation-delay:.54s;}
.hero-anim.a6{animation-delay:.3s;}
@keyframes heroUp{to{opacity:1;transform:translateY(0);}}
.scroll-cue{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;z-index:2;}
.scroll-cue span{width:1px;height:26px;background:linear-gradient(180deg,var(--accent),transparent);animation:scrollCue 1.8s ease-in-out infinite;}
@keyframes scrollCue{0%{transform:scaleY(.3);opacity:.3;}50%{transform:scaleY(1);opacity:1;}100%{transform:scaleY(.3);opacity:.3;}}

/* ---------- SCROLL REVEAL ---------- */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease;}
.reveal.in-view{opacity:1;transform:translateY(0);}
@media(prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none;}
  .hero-anim{animation:none;opacity:1;transform:none;}
}

/* ---------- SECTIONS ---------- */
section{padding:100px 0;}
@media(max-width:640px){section{padding:64px 0;}}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:44px;flex-wrap:wrap;}
.section-title{font-size:clamp(30px,4.5vw,46px);letter-spacing:-.01em;}
.see-all{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--accent-soft);border-bottom:1px solid var(--accent-soft);padding-bottom:2px;white-space:nowrap;}
.see-all:hover{color:var(--fg);border-color:var(--fg);}

.about-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center;}
@media(max-width:800px){.about-grid{grid-template-columns:1fr;}}
.about-photo{border-radius:14px;overflow:hidden;aspect-ratio:4/5;background:var(--bg-card);}
.about-photo img{width:100%;height:100%;object-fit:cover;}
.about-copy p{color:var(--muted);line-height:1.75;margin-bottom:16px;font-size:16px;}
.stat-row{display:flex;gap:36px;margin-top:28px;flex-wrap:wrap;}
.stat b{display:block;font-family:'Archivo Black',sans-serif;font-size:28px;color:var(--accent-soft);}
.stat span{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}

.services-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
@media(max-width:900px){.services-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:520px){.services-grid{grid-template-columns:1fr;}}
.service-card{background:var(--bg);padding:34px 26px;transition:background .2s;}
.service-card:hover{background:var(--bg-card);}
.service-num{font-size:12px;color:var(--muted);letter-spacing:.1em;}
.service-card h3{font-size:19px;margin:14px 0 10px;font-weight:700;}
.service-card p{color:var(--muted);font-size:14px;line-height:1.6;}

.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
@media(max-width:900px){.proj-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.proj-grid{grid-template-columns:1fr;}}
.proj-card{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:4/5;background:var(--bg-card);cursor:pointer;}
.proj-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.proj-card:hover img{transform:scale(1.06);}
.proj-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.88));display:flex;flex-direction:column;justify-content:flex-end;padding:20px;}
.proj-tag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-soft);margin-bottom:6px;}
.proj-title{font-size:19px;font-weight:700;}

.music-banner{position:relative;border-radius:22px;overflow:hidden;padding:70px 48px;background:linear-gradient(120deg,#17140c,#0a0a0b 60%);border:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:30px;flex-wrap:wrap;}
.music-banner:before{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(205,167,70,.25),transparent 70%);}
.music-banner h2{font-size:clamp(26px,4vw,42px);max-width:520px;position:relative;}
.music-banner p{color:var(--muted);margin-top:10px;max-width:440px;position:relative;}

.contact-block{display:grid;grid-template-columns:1fr 1fr;gap:60px;}
@media(max-width:800px){.contact-block{grid-template-columns:1fr;}}
.contact-info h2{font-size:clamp(30px,4.5vw,46px);margin-bottom:18px;}
.contact-info p{color:var(--muted);line-height:1.7;margin-bottom:22px;max-width:420px;}
.contact-row{display:flex;gap:14px;align-items:center;margin-bottom:14px;font-size:15px;}
.contact-row .ico{width:38px;height:38px;border-radius:50%;background:var(--bg-card);display:flex;align-items:center;justify-content:center;color:var(--accent-soft);flex-shrink:0;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.field input,.field textarea,.field select{
  width:100%;background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;color:var(--fg);font-size:14px;font-family:inherit;
}
.field textarea{resize:vertical;min-height:100px;}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--accent);outline-offset:1px;}

footer{border-top:1px solid var(--line);padding:36px 0;}
.foot-row{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted);}

/* ---------- PAGE HEADER (projects/music/admin) ---------- */
.page-header{padding:26px 32px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,11,.9);backdrop-filter:blur(10px);z-index:30;}
.back-link{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--muted);}
.back-link:hover{color:var(--fg);}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;}

/* ---------- PROJECTS PAGE ---------- */
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin:38px 0 40px;}
.filter-chip{padding:9px 18px;border-radius:999px;border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;}
.filter-chip.active,.filter-chip:hover{border-color:var(--accent-soft);color:var(--accent-soft);}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;}

/* ---------- MODAL / LIGHTBOX ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(6,6,7,.86);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-box{background:var(--bg-alt);border:1px solid var(--line);border-radius:18px;max-width:760px;width:100%;max-height:88vh;overflow:auto;}
.modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;}
.modal-body{padding:30px;}
.modal-close{position:absolute;top:18px;right:24px;font-size:26px;color:var(--fg);background:rgba(0,0,0,.4);width:40px;height:40px;border-radius:50%;}

/* ---------- MUSIC PAGE ---------- */
.artist-header{position:relative;display:flex;align-items:flex-end;gap:26px;padding:60px 32px 40px;overflow:hidden;flex-wrap:wrap;}
.artist-header-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(0) brightness(.4);}
.artist-header:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,11,.2),var(--bg) 92%);}
.artist-photo{width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid var(--bg);position:relative;z-index:2;flex-shrink:0;}
.artist-meta{position:relative;z-index:2;}
.artist-meta .eyebrow{color:var(--accent-soft);}
.artist-meta h1{font-size:clamp(34px,6vw,64px);margin:6px 0 8px;}
.artist-meta p{color:var(--muted);font-size:14px;}
.platform-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;position:relative;z-index:2;}
.platform-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:999px;background:var(--bg-card);border:1px solid var(--line);font-size:13px;font-weight:600;}
.platform-btn:hover{border-color:var(--accent-soft);color:var(--accent-soft);}

.song-row{display:grid;grid-template-columns:32px 52px 1fr auto;gap:16px;align-items:center;padding:12px 16px;border-radius:10px;transition:background .15s;cursor:pointer;}
.song-row:hover{background:var(--bg-card);}
.song-row.playing{background:var(--bg-card);}
.song-idx{color:var(--muted);font-size:14px;text-align:center;}
.song-row.playing .song-idx{color:var(--accent-soft);}
.song-art{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--bg-card);}
.song-title{font-weight:600;font-size:15px;}
.song-album{color:var(--muted);font-size:13px;margin-top:2px;}
.song-dur{color:var(--muted);font-size:13px;}
.song-play-ico{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#141410;display:flex;align-items:center;justify-content:center;font-size:13px;}

.disco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;}
.disco-card img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;margin-bottom:10px;}
.disco-card h4{font-size:14px;font-weight:700;}
.disco-card span{font-size:12px;color:var(--muted);}

.mini-player{position:fixed;bottom:0;left:0;right:0;background:#111113ee;backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:16px;z-index:60;transform:translateY(110%);transition:transform .35s ease;}
.mini-player.show{transform:translateY(0);}
.mini-player img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.mini-meta{min-width:0;flex-shrink:0;width:150px;}
.mini-meta .t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-meta .a{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-controls{display:flex;align-items:center;gap:14px;flex:1;min-width:150px;}
.mini-play-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#141410;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.mini-track{flex:1;height:4px;background:var(--line);border-radius:4px;position:relative;overflow:hidden;min-width:80px;}
.mini-track-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent-soft);width:0%;}
.mini-status{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap;}
@media(max-width:640px){.mini-meta{width:90px;}.mini-status{display:none;}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--fg);color:#141410;padding:12px 22px;border-radius:999px;font-size:13px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
.hint{font-size:12px;color:var(--muted);margin-top:6px;}
</style>
</head>

async function getDocData(name){
  try{
    const snap = await db.collection("sitedata").doc(name).get();
    return snap.exists ? snap.data() : null;
  }catch(e){ console.error(e); return null; }
}
async function setDocData(name, data){
  try{ await db.collection("sitedata").doc(name).set(data); return true; }
  catch(e){ console.error("firestore error", e); return false; }
}
async function loadAll(){
  const [s,p,m] = await Promise.all([getDocData("site"),getDocData("projects"),getDocData("music")]);
  if(s) site = Object.assign(structuredClone(DEFAULT_SITE), s);
  if(p && p.list) projects = p.list;
  if(m) music = Object.assign(structuredClone(DEFAULT_MUSIC), m);
}
async function saveSite(){ return await setDocData("site", site); }
async function saveProjects(){ return await setDocData("projects", {list: projects}); }
async function saveMusic(){ return await setDocData("music", music); }

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 2200);
}
function uid(){ return "id"+Math.random().toString(36).slice(2,10); }
function esc(str){ return (str||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function nl2br(str){ return esc(str).replace(/\n/g,"<br>"); }

function initScrollReveal(){
  const els = document.querySelectorAll(".reveal");
  if(!els.length) return;
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add("in-view"); obs.unobserve(e.target); }
    });
  }, {threshold:0.15});
  els.forEach(el=>obs.observe(el));
}
function serviceCopy(s){
  const map = {
    "Photography":"Portraits, editorial and campaign photography with a focus on natural light and mood.",

    "Design & Brand Identity":"Logos, visual systems and packaging built to hold up across every touchpoint."
  };
  return map[s] || "";
}

      <div class="mini-track"><div class="mini-track-fill" id="trackFill"></div></div>
    </div>
    <div class="mini-status" id="miniStatus">${s.audioUrl ? (isPlaying?'Playing…':'Paused') : 'No audio source added'}</div>
  `;
}
function playSong(id){
  if(currentSongId === id){ togglePlay(); return; }
  currentSongId = id; isPlaying = true;
  const s = music.songs.find(x=>x.id===id);
  if(audioEl){ audioEl.pause(); audioEl = null; }
  if(s.audioUrl){
    audioEl = new Audio(s.audioUrl);
    audioEl.play().catch(()=>{ isPlaying=false; renderMusicPage(); });
    audioEl.ontimeupdate = updateTrackFill;
    audioEl.onended = ()=>{ isPlaying=false; renderMusicPage(); };
  } else {
    simulateProgress();
  }
  renderMusicPage();
}
function togglePlay(){
  if(!currentSongId) return;
  const s = music.songs.find(x=>x.id===currentSongId);
  isPlaying = !isPlaying;
  if(audioEl){ isPlaying ? audioEl.play() : audioEl.pause(); }
  else if(isPlaying && !s.audioUrl){ simulateProgress(); }
  renderMusicPage();
}
let simTimer = null;
function simulateProgress(){
  clearInterval(simTimer);
  let pct = 0;
  simTimer = setInterval(()=>{
    if(!isPlaying){ return; }
    pct += 1.2;
    if(pct>100) pct = 0;
    const fill = document.getElementById("trackFill");
    if(fill) fill.style.width = pct+"%";
  }, 300);
}
function updateTrackFill(){
  if(!audioEl) return;
  const pct = (audioEl.currentTime / (audioEl.duration||1)) * 100;
  const fill = document.getElementById("trackFill");
  if(fill) fill.style.width = pct+"%";
}


boot();
</script>
</body>
</html>
